# udev rules to block physical keyboard and mouse input in kiosk mode.
# This prevents unauthorized users from interacting with the player.
#
# How it works:
# - Cage compositor already restricts all interaction to a single fullscreen app
# - These rules provide additional defense-in-depth by preventing USB HID devices
#   from being recognized while kiosk mode is active
# - The rules can be disabled by the unlock mechanism for maintenance
#
# Requirement: 14.2 (block keyboard/mouse in kiosk mode)
#
# Installation: Copy to /etc/udev/rules.d/99-prodooh-kiosk-block-input.rules
# To apply: sudo udevadm control --reload-rules && sudo udevadm trigger
# To disable (for maintenance): Remove the file and reload rules

# Block USB keyboards (bInterfaceProtocol 01 = keyboard)
ACTION=="add", SUBSYSTEM=="usb", ATTR{bInterfaceClass}=="03", ATTR{bInterfaceProtocol}=="01", ENV{PRODOOH_KIOSK_LOCKED}=="1", RUN+="/bin/sh -c 'echo 0 > /sys$env{DEVPATH}/authorized'"

# Block USB mice (bInterfaceProtocol 02 = mouse)
ACTION=="add", SUBSYSTEM=="usb", ATTR{bInterfaceClass}=="03", ATTR{bInterfaceProtocol}=="02", ENV{PRODOOH_KIOSK_LOCKED}=="1", RUN+="/bin/sh -c 'echo 0 > /sys$env{DEVPATH}/authorized'"
