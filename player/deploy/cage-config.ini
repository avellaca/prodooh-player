# Cage Compositor Configuration for Prodooh Player Kiosk Mode
#
# Cage is a Wayland kiosk compositor that restricts to a single fullscreen
# application. By design, Cage:
# - Shows only one application in fullscreen
# - Does not provide window decorations, task bars, or app switchers
# - Does not allow switching to other applications
# - Blocks keyboard shortcuts (Alt+Tab, Ctrl+Alt+Del, etc.)
#
# This makes it ideal for digital signage kiosk deployments.
#
# Requirements: 14.1 (auto-start fullscreen), 14.2 (block keyboard/mouse escape)

# Output configuration - defaults to connected display at native resolution
# For Samsung QM65C (3840x2160), Cage auto-detects via EDID
[output:*]
# No rotation by default (landscape mode)
# Set to 90 or 270 for portrait mode installations
transform=normal

# Keyboard configuration
# Cage by default doesn't expose virtual terminals or key combos to exit
# The following ensures no keyboard shortcuts can break out
[keyboard]
# Disable all compositor key bindings (no VT switching)
meta_key=none

# Input device handling
[input:*]
# Disable cursor (digital signage doesn't need a visible cursor)
cursor_visible=false
