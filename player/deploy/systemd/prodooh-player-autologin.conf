# Auto-login configuration for the prodooh user.
# This enables the player to start automatically without manual login.
#
# Install to: /etc/systemd/system/getty@tty1.service.d/autologin.conf
#
# Requirement: 14.1 (auto-start without manual login)

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin prodooh --noclear %I $TERM
