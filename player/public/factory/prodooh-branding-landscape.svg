<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#16213e"/>
      <stop offset="50%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </radialGradient>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.02); }
      }
      @keyframes accent-line {
        0%, 100% { width: 200px; opacity: 0.8; }
        50% { width: 320px; opacity: 1; }
      }
      .brand-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 120px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        fill: #ffffff;
        text-anchor: middle;
        animation: pulse 4s ease-in-out infinite;
      }
      .tagline {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 36px;
        font-weight: 300;
        letter-spacing: 0.2em;
        fill: #ffffff;
        opacity: 0.7;
        text-anchor: middle;
      }
      .accent {
        fill: #e94560;
        animation: accent-line 3s ease-in-out infinite;
      }
    </style>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>
  <text class="brand-text" x="960" y="500">PRODOOH</text>
  <text class="tagline" x="960" y="570">DIGITAL SIGNAGE</text>
  <rect class="accent" x="810" y="620" width="300" height="4" rx="2"/>
</svg>
